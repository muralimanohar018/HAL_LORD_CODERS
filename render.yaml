services:
  - type: web
    name: hal-lord-backend-api
    env: python
    rootDir: backend/api_server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ML_API_URL
        value: https://hal-lord-coders.onrender.com/predict
      - key: ML_ENDPOINT
        value: https://hal-lord-coders.onrender.com/predict
      - key: ML_TIMEOUT_SECONDS
        value: "60"
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: 3.11.11
