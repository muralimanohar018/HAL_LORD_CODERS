services:
  - type: web
    name: campusshield-ml-api
    env: python
    autoDeploy: true
    buildCommand: pip install -r requirements-ml.txt && python -m nltk.downloader stopwords
    startCommand: uvicorn ml.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MODEL_VERSION
        value: tfidf-logreg-v1
      - key: SCAM_THRESHOLD
        value: "0.70"
